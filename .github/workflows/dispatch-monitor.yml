name: Dispatch Bilibili Live Monitor

on:
  schedule:
    # Temporary registration test during UTC hour 06. This will be narrowed after verification.
    - cron: "*/5 6 * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Dispatch private monitor
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_REPO: Thexeus-0320/bup-live-feishu-monitor
          TARGET_WORKFLOW: live-monitor.yml
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW}/dispatches" \
            -d '{"ref":"main"}'
